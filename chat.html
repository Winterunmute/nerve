<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NERVE // AI DRAFT</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border-bright: #3a3a3a;
    --green: #98c379;
    --green-dim: #4a6340;
    --green-glow: rgba(152, 195, 121, 0.12);
    --blue: #61afef;
    --blue-dim: #2a4a6a;
    --red: #e06c75;
    --yellow: #e5c07b;
    --muted: #5c6370;
    --text: #abb2bf;
    --text-bright: #dcdfe4;
    --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── titlebar ── */
  .titlebar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    height: 36px;
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .title-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 6px rgba(97, 175, 239, 0.4);
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  .titlebar-text { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; flex: 1; }
  .titlebar-proj { color: var(--blue); }
  .titlebar-btn {
    width: 28px; height: 28px; border: none; background: none;
    color: var(--muted); font-size: 14px; cursor: pointer;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    -webkit-app-region: no-drag; transition: all 0.15s;
  }
  .titlebar-btn:hover { background: var(--surface2); color: var(--text-bright); }
  .titlebar-btn.close:hover { background: rgba(224,108,117,0.2); color: var(--red); }
  .titlebar-btn.active { color: var(--blue); background: var(--surface2); }

  .model-select {
    -webkit-app-region: no-drag;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 6px;
    height: 22px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    letter-spacing: 0.03em;
    max-width: 180px;
  }
  .model-select:hover { border-color: var(--border-bright); }
  .model-select:focus { border-color: var(--green-dim); }
  .model-select option { background: var(--surface2); color: var(--text); }

  /* ── loading bar ── */
  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--bg) 0%, var(--blue) 50%, var(--bg) 100%);
    background-size: 300% 100%;
    animation: loadSlide 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  .loading-bar.hidden { display: none; }
  @keyframes loadSlide {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px 8px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-height: 0;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    padding: 2px 0;
    line-height: 1.75;
    font-size: 12px;
  }
  .msg-prefix {
    flex-shrink: 0;
    width: 14px;
    font-weight: 700;
    padding-top: 1px;
  }
  .msg-body {
    flex: 1;
    white-space: pre-wrap;
    word-break: break-word;
    -webkit-user-select: text;
    user-select: text;
  }

  .msg.user     .msg-prefix { color: var(--blue); }
  .msg.user     .msg-body   { color: var(--text-bright); }
  .msg.assistant .msg-prefix { color: var(--green); }
  .msg.assistant .msg-body   { color: var(--text); }
  .msg.system   .msg-prefix { color: var(--muted); }
  .msg.system   .msg-body   { color: var(--muted); font-style: italic; }
  .msg.found    .msg-prefix { color: var(--green-dim); }
  .msg.found    .msg-body   { color: var(--muted); }
  .msg.skipped  .msg-prefix { color: var(--border-bright); }
  .msg.skipped  .msg-body   { color: var(--border-bright); }
  .msg.error    .msg-prefix { color: var(--red); }
  .msg.error    .msg-body   { color: var(--red); }
  .msg.success  .msg-prefix { color: var(--green); }
  .msg.success  .msg-body   { color: var(--green); }

  .cursor-blink {
    display: inline-block;
    width: 7px; height: 13px;
    background: var(--green);
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── footer ── */
  .footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .input-prefix {
    color: var(--blue);
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  #chatInput {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-bright);
    outline: none;
    transition: border-color 0.15s;
    -webkit-user-select: text;
    user-select: text;
  }
  #chatInput:focus { border-color: var(--blue-dim); }
  #chatInput::placeholder { color: var(--muted); }
  #chatInput:disabled { opacity: 0.38; cursor: not-allowed; }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 4px;
    border: 1px solid var(--border-bright);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) { background: var(--border); border-color: var(--muted); }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.32; cursor: not-allowed; }

  .btn.primary {
    border-color: var(--green-dim);
    color: var(--green);
    background: var(--green-glow);
  }
  .btn.primary:hover:not(:disabled) { background: rgba(152,195,121,0.2); border-color: var(--green); }

  .action-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #generateBtn { flex: 1; }

  /* ── form view ── */
  .form-view {
    display: none;
    flex: 1;
    flex-direction: column;
    padding: 10px 14px 6px;
    gap: 6px;
    min-height: 0;
    overflow-y: auto;
  }
  .form-view.visible { display: flex; }
  .form-view::-webkit-scrollbar { width: 4px; }
  .form-view::-webkit-scrollbar-track { background: transparent; }
  .form-view::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .form-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    display: flex; gap: 6px; align-items: center;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .form-label:first-child { margin-top: 0; }
  .form-opt { font-size: 9px; color: var(--border-bright); text-transform: none; letter-spacing: 0; }

  .form-textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-bright);
    line-height: 1.75;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    -webkit-user-select: text;
    user-select: text;
    flex-shrink: 0;
  }
  .form-textarea:focus { border-color: var(--blue-dim); }
  .form-textarea::placeholder { color: var(--muted); }

  .form-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-bright);
    outline: none;
    transition: border-color 0.15s;
    -webkit-user-select: text;
    user-select: text;
    flex-shrink: 0;
    width: 100%;
  }
  .form-input:focus { border-color: var(--blue-dim); }
  .form-input::placeholder { color: var(--muted); }

  .file-add-row { display: flex; gap: 5px; flex-shrink: 0; }
  .file-add-row .form-input { flex: 1; width: auto; }
  .btn-sm {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 10px; border-radius: 3px;
    border: 1px solid var(--border-bright);
    background: var(--surface2); color: var(--muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-sm:hover { background: var(--border); color: var(--text-bright); border-color: var(--muted); }

  .chip-list { display: flex; flex-wrap: wrap; gap: 4px; flex-shrink: 0; }
  .chip {
    display: flex; align-items: center; gap: 3px;
    background: var(--surface2); border: 1px solid var(--border-bright);
    border-radius: 3px; padding: 2px 6px;
    font-size: 10px; color: var(--blue); max-width: 240px;
  }
  .chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-remove {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 12px; line-height: 1;
    padding: 0 1px; flex-shrink: 0;
  }
  .chip-remove:hover { color: var(--red); }

  .radio-group { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; }
  .radio-opt {
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--muted);
    cursor: pointer; padding: 4px 12px;
    border: 1px solid var(--border); border-radius: 3px;
    background: var(--surface2); transition: all 0.15s;
    -webkit-user-select: none; user-select: none; min-width: 38px;
  }
  .radio-opt:hover { border-color: var(--border-bright); color: var(--text); }
  .radio-opt.active { border-color: var(--green-dim); color: var(--green); background: var(--green-glow); }
  .radio-opt input[type="radio"] { display: none; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="title-dot"></div>
  <span class="titlebar-text">NERVE // AI DRAFT <span class="titlebar-proj" id="projLabel"></span></span>
  <select class="model-select" id="modelSelect" title="Ollama model"></select>
  <button class="titlebar-btn" id="toggleViewBtn" onclick="toggleView()" title="Toggle form / chat">≡</button>
  <button class="titlebar-btn" onclick="ipcRenderer.send('minimize-window')" title="Minimize">─</button>
  <button class="titlebar-btn close" onclick="window.close()" title="Close">✕</button>
</div>
<div class="loading-bar" id="loadingBar"></div>

<div class="messages" id="messages"></div>

<div class="form-view" id="formView">
  <div class="form-label">goal <span class="form-opt">what to build — becomes plan.md</span></div>
  <textarea id="goalInput" class="form-textarea" rows="4"
    placeholder="Describe what you want to build..."></textarea>

  <div class="form-label">constraints <span class="form-opt">optional — scope, rules, limitations</span></div>
  <input type="text" id="constraintsInput" class="form-input"
    placeholder="e.g. no external deps, must work offline...">

  <div class="form-label">tasks <span class="form-opt">one per line — becomes tasks.md</span></div>
  <div class="radio-group" id="taskCountGroup">
    <label class="radio-opt active" data-val="1"><input type="radio" name="taskCount" value="1" checked> 1</label>
    <label class="radio-opt" data-val="3"><input type="radio" name="taskCount" value="3"> 3</label>
    <label class="radio-opt" data-val="5"><input type="radio" name="taskCount" value="5"> 5</label>
    <label class="radio-opt" data-val="custom"><input type="radio" name="taskCount" value="custom"> custom</label>
  </div>
  <textarea id="tasksInput" class="form-textarea" rows="3"
    placeholder="- First task&#10;- Second task"></textarea>

  <div class="form-label">files <span class="form-opt">optional — reference files for context</span></div>
  <div class="file-add-row">
    <input type="text" id="fileInput" class="form-input" list="fileDatalist"
           placeholder="type to filter project files..." autocomplete="off">
    <datalist id="fileDatalist"></datalist>
    <button class="btn-sm" id="fileAddBtn" onclick="addFileChip()">add</button>
  </div>
  <div class="chip-list" id="fileChips"></div>
</div>

<div class="footer">
  <div class="input-row">
    <span class="input-prefix">&gt;</span>
    <input type="text" id="chatInput" placeholder="describe what you want to build..." disabled>
    <button class="btn" id="sendBtn" onclick="handleSend()" disabled>send</button>
  </div>
  <div class="action-row" id="chatActions">
    <button class="btn primary" id="generateBtn" onclick="handleGenerate()" disabled>◉ generate draft</button>
    <button class="btn" onclick="clearChat()">clear</button>
  </div>
  <div class="action-row" id="formActions" style="display:none">
    <button class="btn primary" id="sendDraftBtn" onclick="handleSendDraft()">◉ send to NERVE</button>
    <button class="btn" onclick="clearForm()">clear</button>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron')

const OLLAMA_MODEL = 'qwen2.5-coder:7b'
const OLLAMA_URL   = 'http://localhost:11434/api/chat'
const OLLAMA_TAGS  = 'http://localhost:11434/api/tags'

const GENERATE_PROMPT = `Generate the dispatch draft now. Output ONLY the markdown — no preamble, no explanation, no code fences.

Only include scope and decisions explicitly discussed. Do not invent paths or add anything not raised in this conversation.

## Plan
[what was decided and why — high-level only]

## Tasks
- [first task — most foundational]
- [subsequent tasks, one discrete action each]
- Update CLAUDE.md to reflect completed work`

let conversationHistory = []
let isStreaming = false
let systemPrompt = ''

const messagesEl   = document.getElementById('messages')
const formView     = document.getElementById('formView')
const goalInput    = document.getElementById('goalInput')
const constraintsInput = document.getElementById('constraintsInput')
const tasksInput   = document.getElementById('tasksInput')
const chatInput    = document.getElementById('chatInput')
const sendBtn      = document.getElementById('sendBtn')
const generateBtn  = document.getElementById('generateBtn')
const loadingBar   = document.getElementById('loadingBar')
const projLabel    = document.getElementById('projLabel')
const modelSelect  = document.getElementById('modelSelect')
const toggleViewBtn = document.getElementById('toggleViewBtn')
const chatActions  = document.getElementById('chatActions')
const formActions  = document.getElementById('formActions')

let isFormView = false
let selectedFiles = []

// ── file multi-select ─────────────────────────────────────────────────────────

async function loadProjectFiles() {
  try {
    const files = await ipcRenderer.invoke('list-project-files')
    const dl = document.getElementById('fileDatalist')
    dl.innerHTML = ''
    for (const f of files) {
      const opt = document.createElement('option')
      opt.value = f
      dl.appendChild(opt)
    }
    const btn = document.getElementById('fileAddBtn')
    if (files.length === 0) {
      btn.disabled = true
      document.getElementById('fileInput').placeholder = 'no project files found'
    }
  } catch {}
}

function addFileChip() {
  const input = document.getElementById('fileInput')
  const val = input.value.trim()
  if (!val || selectedFiles.includes(val)) { input.value = ''; return }
  selectedFiles.push(val)
  renderFileChips()
  input.value = ''
  input.focus()
}

function removeFileChip(f) {
  selectedFiles = selectedFiles.filter(x => x !== f)
  renderFileChips()
}

function renderFileChips() {
  const list = document.getElementById('fileChips')
  list.innerHTML = ''
  for (const f of selectedFiles) {
    const chip = document.createElement('div')
    chip.className = 'chip'
    chip.innerHTML =
      `<span title="${esc(f)}">${esc(f)}</span>` +
      `<button class="chip-remove" onclick="removeFileChip(${JSON.stringify(f)})">×</button>`
    list.appendChild(chip)
  }
}

// ── task count radio ──────────────────────────────────────────────────────────

const TASK_STUB = '- '

document.getElementById('taskCountGroup').addEventListener('click', e => {
  const label = e.target.closest('.radio-opt')
  if (!label) return
  document.querySelectorAll('#taskCountGroup .radio-opt').forEach(l => l.classList.remove('active'))
  label.classList.add('active')
  const radio = label.querySelector('input[type="radio"]')
  if (radio) radio.checked = true
  const val = label.dataset.val
  if (val === 'custom') return
  const n = parseInt(val, 10)
  // Only populate if textarea is empty or was auto-populated (all lines are stubs)
  const lines = tasksInput.value.split('\n').filter(l => l.trim())
  const allStubs = lines.every(l => l === TASK_STUB)
  if (!tasksInput.value.trim() || allStubs) {
    tasksInput.value = Array.from({ length: n }, () => TASK_STUB).join('\n')
  }
})

// ── view toggle ───────────────────────────────────────────────────────────────

function toggleView() {
  isFormView = !isFormView
  messagesEl.style.display  = isFormView ? 'none' : ''
  formView.classList.toggle('visible', isFormView)
  chatActions.style.display = isFormView ? 'none' : ''
  formActions.style.display = isFormView ? '' : 'none'

  // Update the input row — hide chat input in form mode
  const inputRow = document.querySelector('.input-row')
  inputRow.style.display = isFormView ? 'none' : ''

  toggleViewBtn.classList.toggle('active', isFormView)
  toggleViewBtn.title = isFormView ? 'Switch to chat' : 'Switch to form'

  if (isFormView) {
    goalInput.focus()
  } else {
    if (!chatInput.disabled) chatInput.focus()
  }
}

// ── init ─────────────────────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', () => { loadModels(); loadContext(); loadProjectFiles() })

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !isStreaming) {
    e.preventDefault()
    handleSend()
  }
})

document.getElementById('fileInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addFileChip() }
})

// ── model selector ────────────────────────────────────────────────────────────

async function loadModels() {
  const saved = localStorage.getItem('nerve-model')
  try {
    const res = await fetch(OLLAMA_TAGS)
    if (!res.ok) throw new Error('no response')
    const { models } = await res.json()
    const names = (models || []).map(m => m.name).sort()
    modelSelect.innerHTML = ''
    for (const name of names) {
      const opt = document.createElement('option')
      opt.value = name
      opt.textContent = name
      modelSelect.appendChild(opt)
    }
    if (saved && names.includes(saved)) {
      modelSelect.value = saved
    } else if (names.length) {
      modelSelect.value = names[0]
      localStorage.setItem('nerve-model', names[0])
    }
  } catch {
    // Ollama unreachable — show offline indicator and disable the selector
    const opt = document.createElement('option')
    opt.value = ''
    opt.textContent = 'ollama offline'
    modelSelect.appendChild(opt)
    modelSelect.disabled = true
    modelSelect.style.color = 'var(--muted)'
  }
}

modelSelect.addEventListener('change', () => {
  if (modelSelect.value) localStorage.setItem('nerve-model', modelSelect.value)
})

// ── context loading ───────────────────────────────────────────────────────────

async function loadContext() {
  addMsg('system', '·', 'Loading context...')
  try {
    const result = await ipcRenderer.invoke('get-context')
    systemPrompt = result.context || ''

    if (result.projectName) {
      projLabel.textContent = '— ' + result.projectName
    }

    // Context summary — one line per source
    if (Array.isArray(result.summary) && result.summary.length > 0) {
      for (const item of result.summary) {
        const note = item.note ? ` (${item.note})` : ''
        if (item.status === 'found') {
          addMsg('found', '✓', item.label + note)
        } else {
          addMsg('skipped', '–', item.label + note)
        }
      }
    }

    if (!systemPrompt) {
      addMsg('system', '·', 'Warning: nerve-ai.md not found. Operating without system prompt.')
    }

    if (!result.projectName) {
      addMsg('system', '·', 'No project selected — describe what you want to build.')
    }
  } catch (err) {
    addMsg('error', '✗', 'Failed to load context: ' + err.message)
  }

  loadingBar.classList.add('hidden')
  chatInput.disabled = false
  sendBtn.disabled   = false
  generateBtn.disabled = false
  chatInput.focus()
}

// ── message rendering ─────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function addMsg(type, prefix, text) {
  const div = document.createElement('div')
  div.className = 'msg ' + type
  div.innerHTML =
    `<span class="msg-prefix">${esc(prefix)}</span>` +
    `<span class="msg-body">${esc(text)}</span>`
  messagesEl.appendChild(div)
  messagesEl.scrollTop = messagesEl.scrollHeight
  return div
}

function createStreamDiv() {
  const div = document.createElement('div')
  div.className = 'msg assistant'
  div.innerHTML =
    `<span class="msg-prefix">·</span>` +
    `<span class="msg-body"><span class="cursor-blink"></span></span>`
  messagesEl.appendChild(div)
  messagesEl.scrollTop = messagesEl.scrollHeight
  return div
}

function updateStreamDiv(div, text) {
  div.querySelector('.msg-body').innerHTML =
    esc(text) + '<span class="cursor-blink"></span>'
  messagesEl.scrollTop = messagesEl.scrollHeight
}

function finalizeStreamDiv(div, text) {
  div.querySelector('.msg-body').textContent = text
  messagesEl.scrollTop = messagesEl.scrollHeight
}

// ── input handling ────────────────────────────────────────────────────────────

async function handleSend() {
  if (isStreaming) return
  const text = chatInput.value.trim()
  if (!text) return
  chatInput.value = ''
  conversationHistory.push({ role: 'user', content: text })
  addMsg('user', '>', text)
  await streamOllama()
}

async function handleGenerate() {
  if (isStreaming) return
  conversationHistory.push({ role: 'user', content: GENERATE_PROMPT })
  addMsg('user', '>', '[Generate Draft]')
  const content = await streamOllama()
  if (!content) return

  const planMatch  = content.match(/^##\s*Plan\s*\n([\s\S]*?)(?=^##\s*Tasks)/mi)
  const tasksMatch = content.match(/^##\s*Tasks\s*\n([\s\S]*)$/mi)

  if (planMatch && tasksMatch) {
    const plan  = planMatch[1].trim()
    const tasks = tasksMatch[1].trim()
    ipcRenderer.send('nerve-draft-ready', { plan, tasks })
    addMsg('success', '✓', 'Draft sent to NERVE. Switch to the main window to review and dispatch.')
  } else {
    addMsg('error', '✗', 'Could not parse ## Plan / ## Tasks. Ask the model to regenerate in the correct format.')
  }
}

function clearChat() {
  conversationHistory = []
  messagesEl.innerHTML = ''
  addMsg('system', '·', 'Chat cleared. Context and system prompt are still loaded.')
}

// ── form view handlers ────────────────────────────────────────────────────────

function handleSendDraft() {
  const goal        = goalInput.value.trim()
  const constraints = constraintsInput.value.trim()
  const tasks       = tasksInput.value.trim()

  if (!goal) {
    goalInput.style.borderColor = 'var(--red)'
    setTimeout(() => { goalInput.style.borderColor = '' }, 1200)
    goalInput.focus()
    return
  }
  if (!tasks || tasks.split('\n').every(l => l.trim() === TASK_STUB || !l.trim())) {
    tasksInput.style.borderColor = 'var(--red)'
    setTimeout(() => { tasksInput.style.borderColor = '' }, 1200)
    tasksInput.focus()
    return
  }

  let plan = goal
  if (constraints) plan += '\n\n## Constraints\n' + constraints
  if (selectedFiles.length > 0) {
    plan += '\n\n## Context Files\n' + selectedFiles.map(f => `- ${f}`).join('\n')
  }

  ipcRenderer.send('nerve-draft-ready', { plan, tasks })
  toggleView() // switch back to chat view
}

function clearForm() {
  goalInput.value        = ''
  constraintsInput.value = ''
  tasksInput.value       = ''
  selectedFiles          = []
  renderFileChips()
  // Reset task count radio to 1
  document.querySelectorAll('#taskCountGroup .radio-opt').forEach(l => l.classList.remove('active'))
  const first = document.querySelector('#taskCountGroup .radio-opt')
  if (first) { first.classList.add('active'); first.querySelector('input').checked = true }
  goalInput.focus()
}

// ── ollama streaming ──────────────────────────────────────────────────────────

async function streamOllama() {
  isStreaming = true
  sendBtn.disabled    = true
  generateBtn.disabled = true

  const streamDiv = createStreamDiv()
  let content = ''

  try {
    const messages = [
      ...(systemPrompt ? [{ role: 'system', content: systemPrompt }] : []),
      ...conversationHistory
    ]

    const response = await fetch(OLLAMA_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: modelSelect.value, messages, stream: true })
    })

    if (!response.ok) {
      const errText = await response.text().catch(() => response.statusText)
      throw new Error(`HTTP ${response.status}: ${errText}`)
    }

    const reader  = response.body.getReader()
    const decoder = new TextDecoder()
    let buf = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buf += decoder.decode(value, { stream: true })
      const lines = buf.split('\n')
      buf = lines.pop() // keep incomplete line in buffer
      for (const line of lines) {
        if (!line.trim()) continue
        try {
          const chunk = JSON.parse(line)
          if (chunk.message?.content) {
            content += chunk.message.content
            updateStreamDiv(streamDiv, content)
          }
        } catch {}
      }
    }

    finalizeStreamDiv(streamDiv, content)
    conversationHistory.push({ role: 'assistant', content })

  } catch (err) {
    streamDiv.remove()
    const isConnErr = err.name === 'TypeError' ||
      err.message.includes('Failed to fetch') ||
      err.message.includes('ECONNREFUSED') ||
      err.message.includes('fetch')
    const msg = isConnErr
      ? 'Ollama is not running. Start it with: ollama serve'
      : 'Error: ' + err.message
    addMsg('error', '✗', msg)
    content = null
  }

  isStreaming = false
  sendBtn.disabled     = false
  generateBtn.disabled = false
  return content
}
